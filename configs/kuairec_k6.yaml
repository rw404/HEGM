# Dataset configuration
dataset:
  name: kuairec
  num_cont_features: 2
  num_cat_features: 29
  time_scale: 1000.0

# Model hyperparameters
model:
  emb_dim: 8
  n_gaussians: 6
  dcn_dropout: 0.3

# Training hyperparameters
training:
  batch_size: 4096
  max_epochs: 30
  lr: 0.00001

# Data paths (relative to repository root)
paths:
  train: data/processed/KuaiRec/train.parquet
  val: data/processed/KuaiRec/val.parquet
  test: data/processed/KuaiRec/test.parquet
