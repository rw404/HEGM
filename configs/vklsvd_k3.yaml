# Dataset configuration
dataset:
  name: vklsvd
  num_cont_features: 32
  num_cat_features: 6
  time_scale: 1.0

# Model hyperparameters
model:
  emb_dim: 8
  n_gaussians: 3
  dcn_dropout: 0.1

# Training hyperparameters
training:
  batch_size: 4096
  max_epochs: 30
  lr: 0.0001

# Data paths (relative to repository root)
paths:
  train: data/processed/VK-LSVD/up0.01_ir0.01/train.parquet
  val: data/processed/VK-LSVD/up0.01_ir0.01/val.parquet
  test: data/processed/VK-LSVD/up0.01_ir0.01/test.parquet
